<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #1a1a2e; }
      .blade { fill: #e0e0e0; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f5f5f5; }
      .blade { fill: #1a1a2e; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37"/>
  <g transform="translate(90,90)">
    <!-- Katana blade (diagonal) -->
    <path class="blade" d="M-8 50 L20 -55 L24 -53 L-4 52Z"/>
    <!-- Blade tip -->
    <path class="blade" d="M20 -55 L22 -65 L24 -53Z"/>
    <!-- Tsuba (guard) -->
    <ellipse cx="-6" cy="52" rx="14" ry="5" fill="#c9a959" transform="rotate(-20)"/>
    <!-- Handle -->
    <line x1="-12" y1="58" x2="-28" y2="74" stroke="#8b4513" stroke-width="8" stroke-linecap="round"/>
    <line x1="-12" y1="58" x2="-28" y2="74" stroke="#c9a959" stroke-width="8" stroke-linecap="round" stroke-dasharray="4 5"/>
    <!-- Slash accent -->
    <path d="M18 -48 Q40 -60 52 -68" stroke="#ff6b35" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M22 -42 Q44 -52 58 -58" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
